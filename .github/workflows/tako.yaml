name: Build Tako's extended PocketBase image

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "pb_hooks/**"
      - ".github/workflows/tako.yaml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.platform }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-24.04
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
          - platform: linux/arm/v7
            runs-on: ubuntu-24.04-arm
          - platform: linux/ppc64le
            runs-on: ubuntu-24.04
          - platform: linux/s390x
            runs-on: ubuntu-24.04
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up platform pairs
        id: platform
        run: |
          platform=${{ matrix.platform }}
          echo "pair=${platform//\//-}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/takodotid/pocketbase

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=ghcr.io/takodotid/pocketbase",push-by-digest=true,name-canonical=true,push=${{ github.event_name == 'push' }}
          target: tako

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ steps.platform.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Get PocketBase version in Dockerfile
        id: pocketbase
        run: |
          export VERSION=$(cat ./Dockerfile | sed -n 's/.*PB_VERSION=\([0-9.]*\).*/\1/p')
          echo "MAJOR=$(echo $VERSION | cut -d . -f1)" >> $GITHUB_OUTPUT
          echo "MINOR=$(echo $VERSION | cut -d . -f2)" >> $GITHUB_OUTPUT
          echo "PATCH=$(echo $VERSION | cut -d . -f3)" >> $GITHUB_OUTPUT

    outputs:
      MAJOR: ${{ steps.pocketbase.outputs.MAJOR }}
      MINOR: ${{ steps.pocketbase.outputs.MINOR }}
      PATCH: ${{ steps.pocketbase.outputs.PATCH }}

  merge:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get current unix timestamp
        id: timestamp
        uses: release-kit/unix-timestamp@7ca717caac85efbb45f438eccf3326f54f90947f # v1.0.0

      - name: Generate Docker image metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/takodotid/pocketbase
          tags: |
            ${{ needs.build.outputs.MAJOR }}-tako
            ${{ needs.build.outputs.MAJOR }}.${{ needs.build.outputs.MINOR }}-tako
            ${{ needs.build.outputs.MAJOR }}.${{ needs.build.outputs.MINOR }}.${{ needs.build.outputs.PATCH }}-tako

            ${{ needs.build.outputs.MAJOR }}-tako-${{ steps.timestamp.outputs.timestamp }}
            ${{ needs.build.outputs.MAJOR }}.${{ needs.build.outputs.MINOR }}-tako-${{ steps.timestamp.outputs.timestamp }}
            ${{ needs.build.outputs.MAJOR }}.${{ needs.build.outputs.MINOR }}.${{ needs.build.outputs.PATCH }}-tako-${{ steps.timestamp.outputs.timestamp }}

            type=sha,prefix=,suffix=-tako,format=short
            type=sha,prefix=,suffix=-tako,format=long

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/takodotid/pocketbase@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/takodotid/pocketbase:${{ steps.meta.outputs.version }}
