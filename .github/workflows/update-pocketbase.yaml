name: Update PocketBase version

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Check Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get latest PocketBase release
        id: latest
        run: |
          LATEST=$(curl -sSf "https://api.github.com/repos/pocketbase/pocketbase/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

      - name: Get current PocketBase version
        id: current
        run: |
          CURRENT=$(sed -n 's/.*PB_VERSION=\([0-9.]*\).*/\1/p' ./Dockerfile)
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT

      - name: Update Dockerfile
        if: ${{ steps.latest.outputs.version != steps.current.outputs.version }}
        run: |
          sed -i "s/PB_VERSION=${{ steps.current.outputs.version }}/PB_VERSION=${{ steps.latest.outputs.version }}/" ./Dockerfile

      - name: Open pull request
        if: ${{ steps.latest.outputs.version != steps.current.outputs.version }}
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump pocketbase to ${{ steps.latest.outputs.version }}"
          branch: "update/pocketbase-${{ steps.latest.outputs.version }}"
          title: "chore: bump pocketbase to ${{ steps.latest.outputs.version }}"
          body: |
            Bumps PocketBase from `${{ steps.current.outputs.version }}` to `${{ steps.latest.outputs.version }}`.

            Release notes: https://github.com/pocketbase/pocketbase/releases/tag/v${{ steps.latest.outputs.version }}
          labels: dependencies
