name: Update PocketBase version

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Check Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get latest PocketBase release
        id: latest
        run: |
          LATEST=$(curl -sSf "https://api.github.com/repos/pocketbase/pocketbase/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

      - name: Get current PocketBase version
        id: current
        run: |
          CURRENT=$(sed -n 's/.*PB_VERSION=\([0-9.]*\).*/\1/p' ./Dockerfile)
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT

      - name: Commit and push updated Dockerfile
        if: ${{ steps.latest.outputs.version != steps.current.outputs.version }}
        run: |
          sed -i "s/PB_VERSION=${{ steps.current.outputs.version }}/PB_VERSION=${{ steps.latest.outputs.version }}/" ./Dockerfile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: bump pocketbase to ${{ steps.latest.outputs.version }}"
          git push
